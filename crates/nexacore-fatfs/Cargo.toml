# =============================================================================
# nexacore-fatfs — read-only FAT12/16/32 parser (WS3-05.4/.5)
# =============================================================================
# Host-testable, dependency-free reader for the FAT family, needed for the UEFI
# EFI System Partition (ESP) and removable USB media. It parses the BIOS
# Parameter Block, walks the FAT cluster chains (12/16/32-bit), and reads
# directory trees (8.3 short names plus assembled VFAT long names) and file
# contents — strictly READ-ONLY, over an immutable device seam.
#
# This is the FAT member of the WS3-05 "compat read-only FS" set (ext4 and NTFS
# are sibling crates/modules). It carries no crypto and no `std`, so it builds
# for both the developer host and the `x86_64-unknown-none` Ring-3 target.
# =============================================================================

[package]
name             = "nexacore-fatfs"
description      = "NexaCore OS read-only FAT12/16/32 filesystem reader — BPB parse, FAT chain walk, 8.3 + VFAT long-name directory reading, file reads over an immutable device seam (WS3-05)."
