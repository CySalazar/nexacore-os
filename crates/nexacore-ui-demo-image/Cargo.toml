# =============================================================================
# nexacore-ui-demo-image — TASK-20 (DE-C4/DE-C5) Ring 3 widget-UI demo image
# =============================================================================
#
# Bootable `no_std + no_main` ELF that the kernel spawns as a Ring 3 process
# to validate the full nexacore-ui widget toolkit on the real framebuffer (VM-103
# acceptance artifact for ADR-0042 D6).
#
# The image:
#   ① Reads device-info from the deposit window (display params per ADR-0040 D3).
#   ② Locates the Display capability token via caps::find_token(7, ...).
#   ③ DisplayMap(offset=0, len=fb_len_page_rounded) → front-buffer user VA.
#   ④ Allocates a 32 MiB back buffer and constructs a Compositor.
#   ⑤ Creates one window (700×460 at (120,90)) and renders an nexacore-ui widget
#      tree: title Label + TextInput + Button + status Label.
#   ⑥ Runs a perpetual input loop driving the widget tree:
#        printable key → append to TextInput, re-render
#        Backspace     → pop char, re-render
#        Enter         → set status "submitted: <text>", re-render
#        empty queue   → task_yield()
#
# Exit codes:
#   0   — (unreachable in normal operation; the daemon loops indefinitely)
#   1   — panic handler invoked
#   2   — no device-info in deposit window, or degenerate geometry, or bpp != 4
#   3   — no Display cap token in deposit window
#   40+ — DisplayMap failed; suffix is the raw kernel errno
#   50  — Canvas construction failed (internal invariant violation)
#
# Built out-of-workspace via:
#   cargo build --manifest-path crates/nexacore-ui-demo-image/Cargo.toml \
#               --target x86_64-unknown-none --release
# =============================================================================

[package]
name         = "nexacore-ui-demo-image"
description  = "TASK-20 (DE-C4/DE-C5) Ring 3 nexacore-ui widget demo image for NexaCore OS (ADR-0042)"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
authors      = ["cySalazar <hello@nexacoreos.com>"]
license      = "Apache-2.0"
repository   = "https://github.com/CySalazar/nexacore-os"
homepage     = "https://nexacoreos.com"
publish      = false

[[bin]]
name = "nexacore-ui-demo-image"
path = "src/main.rs"

[dependencies]
# The compositor + window manager core (TASK-19, ADR-0041).
nexacore-display = { path = "../nexacore-display" }
# nexacore-ui provides the brand-themed widget toolkit (TASK-20, ADR-0042).
nexacore-ui = { path = "../nexacore-ui" }
# nexacore-types carries DisplayInputEvent and the canonical wire encoder/decoder.
# `default-features = false` strips uuid + getrandom for x86_64-unknown-none.
nexacore-types = { path = "../nexacore-types", version = "0.3.0-alpha.2", default-features = false }
# nexacore-driver-shared provides capability deposit window parser + device-info reader.
nexacore-driver-shared = { path = "../nexacore-driver-shared" }
# serde with no_std + alloc: needed for postcard encode/decode helpers.
serde = { version = "1.0", default-features = false, features = ["derive", "alloc"] }
# postcard 1.x: the canonical NexaCore wire encoding (NCIP-Serde-004).
postcard = { version = "1.0", default-features = false, features = ["alloc"] }

[profile.dev]
panic = "abort"

[profile.release]
lto           = true
codegen-units = 1
panic         = "abort"
opt-level     = "z"
