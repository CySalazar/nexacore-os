# =============================================================================
# nexacore-net fuzz harness (cargo-fuzz) — WS13-02.4
# =============================================================================
# Fuzzes the network packet parsers (`nexacore_net::ip::parse_ipv4_packet` /
# `parse_ipv6_packet`), the trust boundary for raw frames off the wire. NOT a
# workspace member — cargo-fuzz requires a standalone bin package (see the
# workspace root `Cargo.toml` `[workspace] exclude` list).
#
# Usage (Rust nightly + cargo-fuzz):
#   cargo install cargo-fuzz
#   cd crates/nexacore-net
#   cargo +nightly fuzz run packet_parse
# =============================================================================

[package]
name = "nexacore-net-fuzz"
version = "0.0.0"
edition = "2024"
publish = false
license = "Apache-2.0"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
nexacore-net = { path = ".." }

[[bin]]
name = "packet_parse"
path = "fuzz_targets/packet_parse.rs"
test = false
doc = false
bench = false
