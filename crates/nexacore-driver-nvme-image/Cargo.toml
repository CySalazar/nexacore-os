# =============================================================================
# nexacore-driver-nvme-image — bootable Ring 3 NVMe driver image (P6.7.8.5)
# =============================================================================
# Specified by `NCIP-Driver-NVMe-014` § S6 and consumed by the kernel
# `DriverLoad (73)` syscall per `NCIP-Driver-Framework-013` § S5.3 step 9.
# The crate compiles the user-space NVMe driver into a `no_std + no_main`
# ELF64 (target `x86_64-unknown-none`) that the kernel ingests via
# `spawn_from_elf`. The ELF entry point is `_start`; it consumes the
# capability tokens passed by the kernel through the `DriverLoad`
# protocol and drives the 13-step bring-up FSM in
# `nexacore_driver_nvme::bringup`.
#
# Excluded from the default workspace `cargo build` matrix (see the root
# `Cargo.toml` `[workspace.exclude]` list) — the host-side `--target`
# requires a cross-toolchain that not every developer machine has. CI
# builds the image explicitly via:
#
#   cargo build --manifest-path crates/nexacore-driver-nvme-image/Cargo.toml \
#               --target x86_64-unknown-none --release
#
# The resulting ELF is fed to `nexacore-driver-pack` (NexaCore Forge, user-space)
# together with the developer-authored `manifest.toml` from
# `crates/nexacore-driver-nvme/manifest.toml` to produce the `NexaCore-Pack v1`
# binary container the kernel validates.
#
# Pattern mirrors the `nexacore-driver-net-virtio-image` sibling that landed
# in P6.7.8.3 and the `nexacore-kernel` ↔ `kernel-runner` split that powers
# the bare-metal boot path.
# =============================================================================

[package]
name             = "nexacore-driver-nvme-image"
description      = "NexaCore OS NVMe driver — bootable Ring 3 ELF image (consumed by DriverLoad)"
version          = "0.3.0-alpha.2"
edition          = "2024"
rust-version     = "1.85"
authors          = ["cySalazar <hello@nexacoreos.com>"]
license          = "Apache-2.0"
repository       = "https://github.com/CySalazar/nexacore-os"
homepage         = "https://nexacoreos.com"
keywords         = ["operating-system", "driver", "nvme", "storage"]
categories       = ["os", "embedded"]
publish          = false

[[bin]]
name = "nexacore-driver-nvme-image"
path = "src/main.rs"

[dependencies]
# Pull the auditable lib in as `path` — no version pin since both
# crates ship in the same repo and bump together.
nexacore-driver-nvme = { path = "../nexacore-driver-nvme" }

# Driver SDK helper (P6.7.8.10, NCIP-013 § S5.3 step 8). Provides the
# capability deposit window parser (`caps::find_token`) and the well-known
# constants (`DRIVER_CAP_DEPOSIT_VA`, `ACTION_TAG_*`) the image consumes
# in `_start` before invoking `MmioMap (70)` / `DmaMap (71)`.
# Dep-free, `no_std`, no transitive supply-chain.
nexacore-driver-shared = { path = "../nexacore-driver-shared" }

# BLK ABI types (`BlkRequest`, `BlkResponse`) and the no-alloc wire helper
# `encode_into_slice` used by the BLK service loop (TASK-14, ADR-0036 D3).
# `default-features = false` disables `id-generation` (UUID/CSPRNG) which
# would not compile on `x86_64-unknown-none`; the image only needs the
# `blk` and `wire` sub-modules.
nexacore-types = { path = "../nexacore-types", default-features = false }

[profile.release]
lto             = true
codegen-units   = 1
panic           = "abort"
strip           = "debuginfo"
opt-level       = "z"

[profile.dev]
panic = "abort"
