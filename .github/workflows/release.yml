# =============================================================================
# NexaCore OS — release pipeline (WS0-04.6)
# =============================================================================
# Builds the reproducible UEFI ISO (WS0-04.1..3), checksums and signs it
# (WS0-04.4/5), re-verifies everything, and publishes the artifact triplet
#
#   nexacore-os-<sha>.iso  /  .iso.sha256  /  .iso.sig
#
# to a GitHub Release. Runs on tag push (v*) — the canonical release path —
# or manually via workflow_dispatch (publishes a prerelease draft).
#
# Required repository secret:
#   NEXACORE_RELEASE_SIGNING_KEY_PEM — the dedicated Ed25519 private key in PEM
#   form (see keys/README.md). Releases FAIL without it by design: an
#   unsigned release would silently break the verification contract.
#
# The build must run on x86_64 Linux: the bare-metal target does not link on
# arm64 hosts (blake3 x86 SIMD asm, see plan WS13-08).
# =============================================================================

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # create the release and upload assets

jobs:
  release-iso:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Require signing key secret
        env:
          SIGNING_KEY_PEM: ${{ secrets.NEXACORE_RELEASE_SIGNING_KEY_PEM }}
        run: |
          if [ -z "${SIGNING_KEY_PEM}" ]; then
            echo "::error::secret NEXACORE_RELEASE_SIGNING_KEY_PEM is not set — refusing to publish an unsigned release (keys/README.md)"
            exit 1
          fi

      - name: Install host prerequisites (xorriso, libfaketime)
        # libfaketime freezes the FAT timestamps inside boot-uefi.img at
        # SOURCE_DATE_EPOCH — required for byte-reproducible ISOs (WS0-04.7).
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xorriso libfaketime

      - name: Install pinned Rust toolchains
        # `rustup show` materializes the workspace toolchain pinned in
        # rust-toolchain.toml (1.85 + x86_64-unknown-none target);
        # build-iso.sh itself installs the dated nightly pinned in
        # disk-image/rust-toolchain.toml (WS0-04.1).
        run: rustup show

      - name: Build, checksum and sign ISO
        env:
          SIGNING_KEY_PEM: ${{ secrets.NEXACORE_RELEASE_SIGNING_KEY_PEM }}
        run: |
          umask 077
          KEY_FILE="$(mktemp)"
          printf '%s\n' "${SIGNING_KEY_PEM}" > "${KEY_FILE}"
          NEXACORE_RELEASE_SIGNING_KEY="${KEY_FILE}" bash scripts/build-iso.sh
          rm -f "${KEY_FILE}"

      - name: Re-verify artifacts (defense in depth)
        # sig-verify-test.sh holds the canonical verification recipe
        # (WS0-04.8) — using it here keeps CI and docs from drifting.
        run: |
          cd dist/iso
          ISO="$(readlink nexacore-os-latest.iso)"
          test -f "${ISO}" && test -f "${ISO}.sha256" && test -f "${ISO}.sig"
          sha256sum -c "${ISO}.sha256"
          bash "${GITHUB_WORKSPACE}/scripts/sig-verify-test.sh" --iso "${ISO}"
          echo "ISO_NAME=${ISO}" >> "${GITHUB_ENV}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist/iso
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            EXTRA_FLAGS="--verify-tag"
          else
            # Manual run: draft prerelease tied to the current commit.
            TAG="manual-${GITHUB_SHA::7}"
            EXTRA_FLAGS="--draft --prerelease --target ${GITHUB_SHA}"
          fi
          gh release create "${TAG}" \
            ${EXTRA_FLAGS} \
            --title "NexaCore OS ${TAG}" \
            --notes "Reproducible UEFI ISO. Verify with \`sha256sum -c\` and the Ed25519 key in \`keys/\` (see keys/README.md)." \
            "${ISO_NAME}" "${ISO_NAME}.sha256" "${ISO_NAME}.sig"
