# =============================================================================
# nexacore-driver-net-virtio — virtio-net first-party user-space driver scaffold
# =============================================================================
# First-party driver for virtio-net (PCI vendor `0x1AF4`, device `0x1041`
# modern / `0x1000` legacy). Specified by `NCIP-Driver-Net-015` § S4 and
# loaded via the `DriverLoad` syscall flow specified by
# `NCIP-Driver-Framework-013` § S5.
#
# This is the **P6.7.8.2 scaffold** delivery: skeleton-only `no_std + alloc`
# library that locks the public surface (virtio constants, virtqueue layout
# types, manifest TOML template) without wiring any syscall path. The
# bootable image sibling (`crates/nexacore-driver-net-virtio-image`, excluded
# from the default workspace matrix like `kernel-runner`) lands in
# P6.7.8.3 together with the device bring-up state machine.
#
# Why a `no_std + alloc` library at this stage:
#   - Matches the precedent `nexacore-kernel` (lib, workspace member) +
#     `kernel-runner` (excluded image sibling) — the lib hosts the
#     auditable logic, the image crate hosts the boot harness.
#   - Keeps the workspace `cargo build --workspace --all-features` green
#     on host targets without a cross-toolchain (the bootable bin would
#     require `x86_64-unknown-none` which is gated to CI / hardware boxes).
#   - Lets clippy / cargo doc / cargo test exercise the crate in the
#     default workspace matrix immediately.
# =============================================================================

[package]
name             = "nexacore-driver-net-virtio"
description      = "NexaCore OS first-party virtio-net user-space driver (NCIP-Driver-Net-015 § S4 scaffold)."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
keywords.workspace     = true
categories.workspace   = true
readme.workspace       = true

[lints]
workspace = true

# -----------------------------------------------------------------------------
# Dependencies
# -----------------------------------------------------------------------------
# The scaffold is deliberately dependency-light: no `nexacore-types`, no
# `nexacore-capability`, no `nexacore-crypto`. The driver's eventual capability
# surface (MmioMap / DmaMap / IrqAttach / DriverLoad) is mediated by the
# kernel; the user-space driver process only needs to issue raw syscalls
# and shape its own data structures. We will reintroduce dependencies in
# P6.7.8.3 when the bring-up state machine starts touching real types
# (`MacAddress`, `IrqVector`, etc. — likely from a new
# `nexacore-driver-net-common` crate per NCIP-015 § R8).
[dependencies]
# `nexacore-driver-shared` provides the well-known deposit VA constant
# (DRIVER_CAP_DEPOSIT_VA), the action-tag constants, and the
# `caps::find_token` helper for locating capability tokens at bring-up
# (NCIP-013 § S5.3 step 8, P6.7.8.10).  Dep-free, no_std-compatible.
nexacore-driver-shared = { workspace = true }
# `nexacore-types` provides the NET channel ABI types (NetRequest, NetResponse,
# NetEvent, LinkState) required by the driver state machine (N1.3,
# NCIP-Driver-Net-015 § S2). Re-introduced now that the bring-up FSM wires
# real IPC types per the plan in the P6.7.8.2 Cargo.toml comment.
#
# `default-features = false` is REQUIRED: the default feature set includes
# `id-generation` which transitively pulls `getrandom`, a crate with no
# implementation for `x86_64-unknown-none`. This library is consumed by the
# bootable image sibling which builds for `x86_64-unknown-none`; the
# `net_channel` and `wire` modules have no dependency on `id-generation`.
# This matches the `default-features = false` pattern used by `nexacore-kernel`.
# Host-side cargo test works without `id-generation` because the test helpers
# in this crate use only `encode_canonical` / `decode_canonical`.
nexacore-types = { path = "../nexacore-types", version = "0.3.0-alpha.2", default-features = false }

[dev-dependencies]
