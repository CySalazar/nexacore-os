# =============================================================================
# nexacore-script — ncScript interpreter / runtime (WS18-02)
# =============================================================================
# The sandboxed, capability-bound runtime for ncScript (NCIP-ncScript-030):
# lexer -> parser -> AST -> tree-walking interpreter, with deterministic
# resource limits (CPU/instructions, memory, time) and deny-by-default
# capability gating of every effect. `no_std + alloc`, embeddable; zero
# production dependencies.
# =============================================================================

