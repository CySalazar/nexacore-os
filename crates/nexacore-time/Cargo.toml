# =============================================================================
# nexacore-time — time service (WS12-02)
# =============================================================================
# An SNTP (RFC 4330) client, a monotonic/wall clock split with NTP-offset
# disciplining, a POSIX-TZ timezone parser with UTC→local civil-time
# conversion, and a settings hook for the selected zone.
#
# Dep-free `no_std + alloc` so it builds for `x86_64-unknown-none`.
# =============================================================================

