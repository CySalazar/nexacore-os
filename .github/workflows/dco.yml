name: dco

# Verifies every commit in a pull request carries a `Signed-off-by:` trailer
# (Developer Certificate of Origin). See CONTRIBUTING.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on every commit in the PR
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git rev-list "$base".."$head"); do
            if ! git log -1 --format=%B "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $sha is missing a Signed-off-by trailer"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add sign-off with: git commit --amend --signoff (or git rebase --signoff)."
            exit 1
          fi
          echo "All commits are signed off."
