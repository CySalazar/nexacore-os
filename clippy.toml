# =============================================================================
# NexaCore OS — Clippy configuration
# =============================================================================
# Clippy lint *groups* (pedantic/nursery/cargo) are configured in the workspace
# Cargo.toml under [workspace.lints.clippy]. This file holds *option-level*
# tuning for individual lints — thresholds, allowlists, disallowed APIs.
#
# References:
#   - https://doc.rust-lang.org/clippy/configuration.html
#   - workspace Cargo.toml — [workspace.lints.clippy]
# =============================================================================

# --- MSRV (Minimum Supported Rust Version) -------------------------------
# Must match `rust-version` in [workspace.package] of the root Cargo.toml.
# Clippy uses MSRV to gate lints that suggest features unavailable on the
# pinned compiler.
msrv = "1.85"

# --- API stability ---------------------------------------------------------
# Pre-1.0: breaking exported API is allowed. Once we ship 1.0 (per
# /docs/06-roadmap.md, no earlier than Phase 4), flip this to `true` and
# combine with semver-checks in CI.
avoid-breaking-exported-api = false

# --- Cognitive complexity threshold ---------------------------------------
# Default 25 is too permissive for security-critical code. We tighten to 20
# and review case-by-case via `#[allow(clippy::cognitive_complexity)]` with
# a written justification in the PR.
cognitive-complexity-threshold = 20

# --- Function arity --------------------------------------------------------
# Functions with > 7 params usually want a struct. Same caveat: explicit
# `#[allow]` plus rationale in PR for exceptions.
too-many-arguments-threshold = 7

# --- Function size ---------------------------------------------------------
# Lines per function (excluding doc comments). 100 is the soft cap.
too-many-lines-threshold = 100

# --- Type complexity -------------------------------------------------------
# Default 250 is fine for most code; tighten incrementally as we refactor.
type-complexity-threshold = 250

# --- Disallowed methods ----------------------------------------------------
# Force conscious use of audit-relevant APIs. Each entry MUST include a
# `reason` so reviewers don't need to re-derive the rationale.
#
# NOTE: TOML 1.0 inline tables ({ ... }) MUST fit on a single line. Do
# not split across newlines — clippy will refuse to load the file.
disallowed-methods = [
  { path = "std::env::var", reason = "Use a config crate (figment / config) so env reads are auditable, typed, and testable. Direct std::env::var bypasses the audit trail." },
  { path = "std::env::var_os", reason = "Same rationale as std::env::var — see config crate guidance." },
  { path = "std::process::exit", reason = "Exit only at the binary entrypoint after graceful shutdown. Library code must return Result and let the caller decide." },
  { path = "std::time::SystemTime::now", reason = "NexaCore OS time must come from a monotonic, attestable clock service (nexacore-runtime). Wall-clock NOW is non-deterministic and TEE-unsafe." },
  { path = "std::sync::Mutex::new", reason = "Prefer parking_lot::Mutex (no PoisonError) or async lock (tokio::sync::Mutex) where the call site is async. Std Mutex has poison semantics that complicate audits." },
  { path = "postcard::to_allocvec", reason = "NCIP-Serde-004 M2: workspace canonical encoding is nexacore_types::wire::encode_canonical, which is the single audit point for serialization. Allowlist via #[allow(clippy::disallowed_methods)] only inside nexacore-types::wire itself." },
  { path = "postcard::to_vec", reason = "Same rationale as postcard::to_allocvec — go through nexacore_types::wire::encode_canonical." },
  { path = "postcard::from_bytes", reason = "NCIP-Serde-004 M2: workspace canonical decoding is nexacore_types::wire::decode_canonical, which enforces the no-trailing-bytes invariant. Allowlist only inside nexacore-types::wire." },
  { path = "postcard::take_from_bytes", reason = "Same rationale as postcard::from_bytes — go through nexacore_types::wire::decode_canonical (which calls take_from_bytes internally + checks tail.is_empty())." },
  { path = "postcard::to_slice", reason = "NCIP-Kernel-012 K3.b: workspace non-allocating canonical encoding is nexacore_types::wire::encode_into_slice. The slice-targeted encoder is audit-critical on the kernel panic path (no allocation permitted) and must go through the single helper that maps postcard errors to NexaCoreError::Wire. Allowlist only inside nexacore-types::wire." },
]

# --- Disallowed types ------------------------------------------------------
disallowed-types = [
  { path = "std::sync::RwLock", reason = "Same rationale as std::sync::Mutex — prefer parking_lot or async equivalents." },
]

# --- Disallowed macros -----------------------------------------------------
disallowed-macros = [
  { path = "std::println", reason = "Use the `tracing` crate. `println!` bypasses log levels, formatting policy, and the eventual structured-log pipeline." },
  { path = "std::eprintln", reason = "Use `tracing::error!` or `tracing::warn!` with structured fields." },
  { path = "std::dbg", reason = "`dbg!` is debug noise that has no place in committed code. Use `tracing::debug!` for intentional debugging output." },
]

# --- Allowed identifier prefixes / suffixes -------------------------------
# Suppresses clippy::module_name_repetitions for these prefixes that are
# unavoidable across the workspace.
allowed-prefixes = ["NexaCore", "nexacore"]

# --- Documentation enforcement --------------------------------------------
# Every public item must have a doc comment (also enforced via
# `missing_docs = "warn"` in workspace lints). This setting tightens
# the check on private items where it materially aids review.
doc-valid-idents = ["NexaCore", "TEE", "TDX", "SEV-SNP", "AGPL", "AEAD", "HKDF", "BLAKE3", "SHA-256", "SHA3-256", "Ed25519", "X25519", "ChaCha20", "ChaCha20-Poly1305", "Argon2", "Argon2id", "P2P", "FF1", "FF3-1", "STARK", "SNARK", "MoE", "NCIP", "RustCrypto", "KiB", "MiB", "GiB", "SemVer", "UUIDv4", "UUIDv7", "Curve25519", "Poly1305",
    # First-party NexaCore product names (CamelCase proper nouns used across docs).
    "ncScript", "NexaCoreShell", "NexaCoreText", "NexaCoreCode", "NexaCoreTerminal", "NCFS",
    # Driver framework + first-party drivers (NCIP-013 / NCIP-014 / NCIP-015 / NCIP-016).
    # These appear repeatedly across the user-space driver crates and the kernel
    # syscall surfaces; backticking each occurrence inline would bury the prose.
    "NVMe", "NVMHCI", "PCIe", "IOMMU", "IOAPIC", "MSI-X",
    "MmioMap", "DmaMap", "IrqAttach", "DriverLoad", "DriverUnload",
    "PciConfigRead", "PciConfigWrite",
    "MmioRegion", "DmaWindow", "IrqLine", "PciDevice",
    "BAR0", "BAR4", "ECAM", "BLK", "PRP", "PRP1", "PRP2", "SGL",
    # Image formats (WS8-03 `nexacore-image`). "WebP" is the one mixed-case
    # proper noun; PNG/JPEG/AVIF are all-caps acronyms clippy already accepts.
    "WebP",
    # Text shaping (WS7-17 `nexacore-display::shaping`): the Unicode BiDi
    # algorithm and the HarfBuzz shaping engine are CamelCase proper nouns.
    "BiDi", "HarfBuzz",
    # Tensor HAL vendor backends (WS5-02 `nexacore-runtime::tensor_dispatch`):
    # "ROCm" is the one mixed-case vendor name; CUDA/AVX/SPIR-V are all-caps.
    "ROCm",
    # Compositor (WS7-01 `nexacore-display`): "ProMotion" is Apple's CamelCase
    # name for adaptive-refresh panels, referenced by the variable-refresh path.
    "ProMotion",
    # Wi-Fi supplicant (WS2-11 `nexacore-driver-wifi`): the 4-way-handshake
    # nonces are CamelCase proper nouns in the 802.11i spec.
    "ANonce", "SNonce",
    # NCFS v3 (WS3-01 `nexacore-fs::v3`): "CoW" (copy-on-write) is the standard
    # mixed-case abbreviation used throughout the filesystem docs; "XChaCha" is
    # the extended-nonce ChaCha variant used for per-volume confidentiality.
    "CoW", "XChaCha",
    # TLS 1.3 stack (WS4-03 `nexacore-tls`): "OpenSSL" is the interop target,
    # "PureEdDSA" the ed25519 signature mode (RFC 8032).
    "OpenSSL", "PureEdDSA",
    # SSH-2 transport (WS4-06 `nexacore-ssh`): "OpenSSH" is the interop target
    # named in the cipher-profile seam docs.
    "OpenSSH",
    # Time service (WS12-02 `nexacore-time`): "TZif" is the IANA binary
    # timezone file format whose last line is the POSIX TZ string we parse.
    "TZif",
]
