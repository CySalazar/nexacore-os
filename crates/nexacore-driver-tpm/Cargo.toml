# =============================================================================
# nexacore-driver-tpm — TPM 2.0 driver (WS2-15)
# =============================================================================
# Host-testable core of the discrete-TPM 2.0 driver: the TIS and CRB MMIO
# register maps plus TPM 2.0 command serialization (the command/response header,
# password auth area, TPM2_PCR_Extend, and TPM2_Quote) and response-header
# parsing. The MMIO locality handshake + command/response transfer land on the
# rig (swtpm). `no_std + alloc`, big-endian wire, dependency-free.
# =============================================================================

[package]
name             = "nexacore-driver-tpm"
description      = "NexaCore OS TPM 2.0 driver core — TIS/CRB register maps, TPM2 command serialization (WS2-15)."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
keywords.workspace     = true
categories.workspace   = true
readme.workspace       = true

[lints]
workspace = true

[dependencies]
# TPM2_Quote attestation (WS10-05.7) computes the quoted `pcrDigest` with the
# hash of the measured PCR bank (SHA-256). Pulled `default-features = false`
# with the `bare-metal` alias so the verify-only crypto build compiles on
# `x86_64-unknown-none` (mirrors `nexacore-kernel`); the quote path only needs
# hashing, never the platform CSPRNG.
nexacore-crypto = { path = "../nexacore-crypto", version = "0.2.0", default-features = false, features = ["bare-metal"] }
