# =============================================================================
# nexacore-log — structured logging service (WS12-03)
# =============================================================================
# A journald-class structured logging core: a typed record schema with syslog
# severities, an ingestion bus that assigns monotonic sequence numbers, a
# persistent ring store with rotation behind a `LogSink` seam, service/severity
# indices, a query API, and a summary surface for the system monitor.
#
# Dep-free `no_std + alloc` so it builds for `x86_64-unknown-none` and can be
# consumed by both the kernel-adjacent service and userspace tooling.
# =============================================================================

